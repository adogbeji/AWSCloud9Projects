<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="home-page">

    <section class="home-page-section--1">
        <figure class="home-page-sect_1-photo-box">
            <img src="images/home-phone-bg.jpg" alt="Smartphone picture" class="home-page-sect_1-photo">
        </figure>
    </section>
    <section class="home-page-section--2">
        <!-- Card Start -->
        <div class="card card__home-page-sect_2-form">
            <div class="card__body">
                <!-- Form Start -->
                <form class="form form__home-page-sect_2-login">
                    <div class="form__group">
                        <figure class="form__home-page-sect_2-photo-box--1 form__home-page-sect_2-mb-3_8">
                            <img src="images/logo.png" alt="Instagram Logo" class="form__home-page-sect_2-photo">
                        </figure>
                    </div>
                    <div class="form__group form__mb-0_4">
                        <input type="email" class="form__control" id="email" name="email" autocomplete="off" placeholder="Phone number, username or email address">
                    </div>

                    <div class="form__group form__mb-0 form__home-page-sect_2-mb-1_6">
                        <input type="password" class="form__control" id="password" name="password" placeholder="Password">
                    </div>

                    <!-- Button Start -->
                    <button type="submit" class="form__btn form__home-page-sect_2-btn--1 form__btn--block">
                        Login
                    </button>
                    <!-- Button End -->

                    <div class="form__group form__mt-1_8">
                        <div class="form__home-page-sect_2-text-box--1">
                            <p class="form__home-page-sect_2-text--1">or</p>
                        </div>
                    </div>

                    <div class="form__group form__mt-3_4">
                        <div class="form__home-page-sect_2-photo-link-box">
                            <figure class="form__home-page-sect_2-photo-box--2">
                                <img src="images/facebook.png" alt="Facebook Logo" class="form__home-page-sect_2-photo">
                            </figure>
                            <div class="form__home-page-sect_2-link-box">
                                <a href="#" class="form__home-page-sect_2-link">
                                    Log in with Facebook
                                </a>
                            </div>
                        </div>
                    </div>
                </form>
                <!-- Form End -->
            </div>
        </div>
        <!-- Card End -->
    </section>
    <section class="home-page-section--3">SECTION 3</section>


    <script src="index.js"></script>
</body>
</html>
